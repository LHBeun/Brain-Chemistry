<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Brain Chemistry – Docent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { background: #1e293b; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #334155; flex-shrink: 0; }
header h1 { font-size: 1.25em; color: #38bdf8; }
.hdr-badge { background: #334155; padding: 3px 10px; border-radius: 20px; font-size: .78em; color: #94a3b8; }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.verbonden-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.leerlingen-teller { font-size: .85em; color: #94a3b8; }

.layout { display: flex; flex: 1; overflow: hidden; }

.sidebar { width: 340px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid #334155; }
.sidebar-header h2 { font-size: .8em; text-transform: uppercase; letter-spacing: .07em; color: #64748b; margin-bottom: 10px; }
.filter-rij { display: flex; flex-direction: column; gap: 6px; }
select.filter, input.filter { width: 100%; padding: 7px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: .85em; outline: none; }
select.filter:focus, input.filter:focus { border-color: #38bdf8; }
.quiz-lijst { flex: 1; overflow-y: auto; padding: 8px; }
.quiz-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: background .12s; }
.quiz-item:hover { background: #0f172a; }
.quiz-item.actief { background: #0c1f38; border-color: #38bdf8; }
.quiz-naam { font-size: .92em; font-weight: 600; margin-bottom: 3px; }
.quiz-meta { font-size: .76em; color: #64748b; display: flex; gap: 6px; flex-wrap: wrap; }
.tag { background: #1e3a5f; color: #7dd3fc; padding: 2px 7px; border-radius: 10px; font-size: .75em; }
.tag.g { background: #14532d; color: #86efac; }
.tag.p { background: #3b0764; color: #d8b4fe; }
.geen-quizzes { padding: 20px; text-align: center; color: #475569; font-size: .88em; }
.sidebar-footer { padding: 12px; border-top: 1px solid #334155; display: flex; flex-direction: column; gap: 6px; }

.btn { cursor: pointer; border: none; border-radius: 6px; font-weight: 700; font-size: .88em; padding: 8px 14px; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-blauw  { background: #38bdf8; color: #0f172a; }
.btn-groen  { background: #22c55e; color: #0f172a; }
.btn-rood   { background: #ef4444; color: #fff; }
.btn-grijs  { background: #334155; color: #e2e8f0; }
.btn-oranje { background: #f97316; color: #0f172a; }
.btn-paars  { background: #a855f7; color: #fff; }
.btn-full   { width: 100%; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.leeg-scherm { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #334155; }
.leeg-scherm .icon { font-size: 3em; margin-bottom: 14px; }

/* Quiz detail */
.quiz-detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.quiz-detail-header { padding: 18px 24px; background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; }
.quiz-detail-header h2 { font-size: 1.3em; margin-bottom: 6px; }
.quiz-detail-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.quiz-acties { display: flex; gap: 8px; flex-wrap: wrap; }
.quiz-content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* Vraag kaarten in lijst */
.vraag-rij { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; cursor: grab; user-select: none; transition: opacity .15s, border-color .15s; }
.vraag-rij:hover { border-color: #475569; }
.vraag-rij.drag-over { border-color: #38bdf8; background: #0c1f38; }
.vraag-rij.dragging  { opacity: .35; }
.drag-handle { color: #475569; font-size: 1.1em; flex-shrink: 0; padding-top: 1px; cursor: grab; }
.vraag-rij-nr { color: #475569; font-size: .8em; flex-shrink: 0; padding-top: 2px; min-width: 22px; }
.vraag-rij-body { flex: 1; min-width: 0; }
.vraag-rij-tekst { font-size: .9em; color: #cbd5e1; margin-top: 4px; }
.optie-chip { font-size: .73em; padding: 2px 8px; border-radius: 10px; background: #334155; color: #94a3b8; }
.optie-chip.juist { background: #14532d; color: #86efac; }
.sleutel-chip { font-size: .73em; padding: 2px 7px; border-radius: 10px; background: #1a2e1a; color: #6ee7b7; border: 1px solid #22c55e44; }
.type-badge { font-size: .72em; padding: 2px 7px; border-radius: 10px; }
.badge-mc     { background: #1e3a5f; color: #7dd3fc; }
.badge-mcm    { background: #1e3a5f; color: #38bdf8; }
.badge-open   { background: #3b0764; color: #d8b4fe; }
.badge-match  { background: #431407; color: #fdba74; }
.badge-sort   { background: #14532d; color: #86efac; }

/* Nieuwe vraag formulier */
.nieuwe-vraag-form { background: #1e293b; border: 1px dashed #334155; border-radius: 8px; padding: 16px; margin-top: 12px; }
.form-sectie-titel { font-size: .82em; color: #64748b; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
.form-rij { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-rij.enkel { grid-template-columns: 1fr; }
label.form-label { font-size: .8em; color: #64748b; display: block; margin-bottom: 4px; }
input.form-inp, textarea.form-inp, select.form-inp { width: 100%; padding: 7px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: .9em; outline: none; }
textarea.form-inp { resize: vertical; font-family: sans-serif; }
input.form-inp:focus, textarea.form-inp:focus, select.form-inp:focus { border-color: #38bdf8; }

.opt-rij, .match-rij, .item-rij { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.opt-letter { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .82em; flex-shrink: 0; }
.opt-letter.A{background:#ef4444} .opt-letter.B{background:#000000;border:1px solid #475569} .opt-letter.C{background:#eab308;color:#0f172a} .opt-letter.D{background:#3b82f6} .opt-letter.E{background:#a855f7} .opt-letter.F{background:#f97316}
.juist-check { cursor: pointer; width: 15px; height: 15px; flex-shrink: 0; accent-color: #22c55e; }
.item-nr { width: 20px; color: #64748b; font-size: .85em; text-align: center; flex-shrink: 0; }
.match-pijl { color: #475569; flex-shrink: 0; }
.form-acties { display: flex; gap: 8px; margin-top: 12px; }
.add-btn { font-size: .82em; padding: 5px 10px; margin-top: 6px; }

/* Sessie */
.sessie-scherm { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.sessie-header { padding: 14px 24px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
.sessie-header h2 { font-size: 1em; }
.voortgang { font-size: .85em; color: #64748b; }
.sessie-knoppen { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
.sessie-body { flex: 1; display: flex; gap: 20px; padding: 20px 24px; overflow: hidden; }
.sessie-links { flex: 1; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
.sessie-rechts { width: 280px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; flex-shrink: 0; }

.actieve-vraag-kaart { background: #1e293b; border-radius: 12px; padding: 22px; }
.actieve-vraag-kaart .type-lbl { font-size: .78em; color: #64748b; margin-bottom: 8px; }
.actieve-vraag-kaart h3 { font-size: 1.2em; line-height: 1.4; margin-bottom: 18px; }
.mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mc-blok { border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 8px; font-size: .9em; font-weight: 600; }
.mc-blok.A{background:#7f1d1d} .mc-blok.B{background:#111111;border:1px solid #475569} .mc-blok.C{background:#78350f} .mc-blok.D{background:#1e3a5f} .mc-blok.E{background:#3b0764} .mc-blok.F{background:#7c2d12}
.mc-blok.juist { outline: 3px solid #22c55e; }
.mc-blok .ltr { font-size: 1.1em; font-weight: 800; }
.match-display { display: flex; flex-direction: column; gap: 8px; }
.match-pair { display: flex; align-items: center; gap: 10px; font-size: .9em; }
.match-pair .term { background: #334155; padding: 6px 12px; border-radius: 6px; }
.match-pair .def  { background: #1e3a5f; padding: 6px 12px; border-radius: 6px; color: #7dd3fc; }
.sort-display { display: flex; flex-direction: column; gap: 6px; }
.sort-item-display { display: flex; align-items: center; gap: 10px; font-size: .9em; }
.sort-nr { background: #334155; width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .8em; font-weight: 700; flex-shrink: 0; }

.stats-kaart { background: #1e293b; border-radius: 12px; padding: 18px; }
.stats-kaart h4 { font-size: .78em; text-transform: uppercase; letter-spacing: .06em; color: #64748b; margin-bottom: 12px; }
.balk-wrap { display: flex; flex-direction: column; gap: 7px; }
.balk-rij { display: flex; align-items: center; gap: 8px; font-size: .84em; }
.balk-lbl { width: 100px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #94a3b8; }
.balk-out { flex: 1; background: #334155; border-radius: 4px; height: 20px; overflow: hidden; }
.balk-in  { height: 100%; border-radius: 4px; transition: width .4s; display: flex; align-items: center; padding-left: 6px; font-size: .78em; font-weight: 700; color: #0f172a; min-width: 2px; }
.balk-cnt { width: 28px; text-align: right; color: #64748b; }
.open-antw-lijst { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
.open-antw-item { border-radius: 6px; padding: 8px 12px; font-size: .86em; display: flex; align-items: flex-start; gap: 8px; }
.open-antw-item.goed { background: #14532d; }
.open-antw-item.fout { background: #1e293b; border: 1px solid #334155; }
.open-antw-naam { font-size: .75em; color: #64748b; margin-bottom: 2px; }
.score-info { margin-top: 10px; font-size: .84em; }
.deelnemers-info { background: #1e293b; border-radius: 10px; padding: 14px; }
.deeln-getal { font-size: 2em; font-weight: 700; color: #38bdf8; }
.deeln-lbl { font-size: .82em; color: #64748b; }
.score-bord-mini { background: #1e293b; border-radius: 10px; padding: 14px; }
.score-bord-mini h4 { font-size: .78em; text-transform: uppercase; letter-spacing: .06em; color: #64748b; margin-bottom: 10px; }
.score-rij { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #0f172a; font-size: .85em; }
.score-pos { width: 20px; color: #64748b; font-size: .78em; }
.score-naam { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.score-punten { font-weight: 700; color: #38bdf8; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #1e293b; border-radius: 14px; padding: 28px; width: 480px; max-width: 95vw; border: 1px solid #334155; }
.modal h3 { margin-bottom: 18px; font-size: 1.1em; }
.modal-acties { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }

/* Wachtwoord overlay */
#ww-overlay {
  position: fixed; inset: 0; background: #0f172a; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
}
.ww-kaart {
  background: #1e293b; border-radius: 16px; padding: 40px 36px;
  width: 340px; text-align: center; border: 1px solid #334155;
}
.ww-kaart h2 { font-size: 1.3em; margin-bottom: 6px; }
.ww-kaart p  { color: #64748b; font-size: .9em; margin-bottom: 24px; }
.ww-input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 2px solid #334155; background: #0f172a; color: #e2e8f0;
  font-size: 1.05em; text-align: center; outline: none; margin-bottom: 10px;
  transition: border-color .15s;
}
.ww-input:focus { border-color: #38bdf8; }
.ww-fout { color: #ef4444; font-size: .85em; margin-bottom: 8px; min-height: 20px; }
</style>
</head>
<body>

<div id="ww-overlay">
  <div class="ww-kaart">
    <h2>🔐 Docenttoegang</h2>
    <p>Voer het docentwachtwoord in</p>
    <input type="password" class="ww-input" id="ww-input" placeholder="Wachtwoord"
           onkeydown="if(event.key==='Enter') wwControle()">
    <div class="ww-fout" id="ww-fout"></div>
    <button onclick="wwControle()" style="width:100%;padding:12px;border:none;border-radius:10px;background:#38bdf8;color:#0f172a;font-size:1em;font-weight:700;cursor:pointer;">Inloggen</button>
  </div>
</div>

<header>
  <h1>🧪 Brain Chemistry</h1>
  <span class="hdr-badge">Docent</span>
  <div class="hdr-right">
    <div class="verbonden-dot"></div>
    <span class="leerlingen-teller"><span id="deeln-teller">0</span> leerlingen online</span>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Quizzes</h2>
      <div class="filter-rij">
        <select class="filter" id="filter-leerjaar" onchange="filterQuizzes()">
          <option value="">Alle leerjaren</option>
          <option>3</option><option>4</option><option>5</option><option>6</option>
        </select>
        <select class="filter" id="filter-niveau" onchange="filterQuizzes()">
          <option value="">Alle niveaus</option>
          <option>MAVO</option><option>HAVO</option><option>VWO</option>
        </select>
        <input class="filter" id="filter-onderwerp" placeholder="Zoek op onderwerp…" oninput="filterQuizzes()">
      </div>
    </div>
    <div class="quiz-lijst" id="quiz-lijst">
      <div class="geen-quizzes">Nog geen quizzes.<br>Maak er een aan!</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-blauw btn-full" onclick="openNieuweQuizModal()">+ Nieuwe quiz</button>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-grijs" style="flex:1" onclick="document.getElementById('csv-import').click()">📂 Importeer CSV</button>
        <button class="btn btn-grijs" onclick="downloadVoorbeeldCSV()" title="Download voorbeeldbestand">📋</button>
      </div>
      <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importeerCSV(event)">
    </div>
  </div>

  <div class="main" id="main">
    <div class="leeg-scherm">
      <div class="icon">📚</div>
      <p>Selecteer een quiz of maak een nieuwe aan</p>
    </div>
  </div>
</div>

<!-- Modal: nieuwe/bewerken quiz -->
<div class="modal-overlay" id="modal-quiz" style="display:none">
  <div class="modal">
    <h3 id="modal-quiz-titel">Nieuwe quiz</h3>
    <div class="form-rij">
      <div><label class="form-label">Naam</label><input class="form-inp" id="modal-naam" placeholder="Bijv. Zuren en Basen – herhaling"></div>
      <div><label class="form-label">Leerjaar</label>
        <select class="form-inp" id="modal-leerjaar"><option>3</option><option>4</option><option>5</option><option>6</option></select>
      </div>
    </div>
    <div class="form-rij">
      <div><label class="form-label">Niveau</label>
        <select class="form-inp" id="modal-niveau"><option>MAVO</option><option>HAVO</option><option>VWO</option></select>
      </div>
      <div><label class="form-label">Onderwerp</label><input class="form-inp" id="modal-onderwerp" placeholder="Bijv. Zuren en Basen"></div>
    </div>
    <div class="modal-acties">
      <button class="btn btn-grijs" onclick="sluitModal('modal-quiz')">Annuleren</button>
      <button class="btn btn-blauw" onclick="slaQuizOp()">Opslaan</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, remove, get, update }
    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmCeuVZr888XzPkfX5MrQ8xxZ96ttaIsQ",
  authDomain: "brain-chemistry.firebaseapp.com",
  databaseURL: "https://brain-chemistry-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "brain-chemistry",
  storageBucket: "brain-chemistry.firebasestorage.app",
  messagingSenderId: "359983668951",
  appId: "1:359983668951:web:8c3504c9d5734219a31a92"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const auth = getAuth(app);

// ── Echte docent-login i.p.v. het oude localStorage-wachtwoordveld ──
const DOCENT_EMAIL = 'docent@brainchemistry.local'; // pas aan indien gewenst

window.wwControle = function() {
  const ww = document.getElementById('ww-input').value;
  signInWithEmailAndPassword(auth, DOCENT_EMAIL, ww)
    .then(() => {
      document.getElementById('ww-overlay').style.display = 'none';
    })
    .catch(() => {
      document.getElementById('ww-fout').textContent = 'Onjuist wachtwoord';
      document.getElementById('ww-input').value = '';
      document.getElementById('ww-input').focus();
    });
};

let listenersGestart = false;

onAuthStateChanged(auth, user => {
  if (user && user.email === DOCENT_EMAIL) {
    document.getElementById('ww-overlay').style.display = 'none';
    if (!listenersGestart) {
      listenersGestart = true;
      startListeners();
    }
  } else {
    document.getElementById('ww-overlay').style.display = 'flex';
  }
});

const LETTERS = ['A','B','C','D','E','F'];
const KLEUR_MAP = { A:'#ef4444', B:'#000000', C:'#eab308', D:'#3b82f6', E:'#a855f7', F:'#f97316' };
const KLEUR_TEKST_MAP = { A:'#0f172a', B:'#e2e8f0', C:'#0f172a', D:'#0f172a', E:'#0f172a', F:'#0f172a' };

// ── State ──
let alleQuizzes    = {};
let actieveQuizId  = null;
let sessieActief   = false;
let sessieVraagIdx = 0;
let huidigeFase    = 'wachten';
let huidigeSessieId = null;

// Formulier state
let nvState = {
  type: 'mc',
  opties: ['', '', ''],
  correct: [],
  paren: [{ l: '', r: '' }, { l: '', r: '' }],
  items: ['', '', '']
};

// ── Firebase listeners (pas gestart na bevestigd docent-login) ──
function startListeners() {
  onValue(ref(db, 'quizzes'), snap => {
    alleQuizzes = snap.exists() ? snap.val() : {};
    renderQuizLijst();
    if (actieveQuizId && !sessieActief) toonQuizDetail(actieveQuizId);
  });

  onValue(ref(db, 'deelnemers'), snap => {
    document.getElementById('deeln-teller').textContent = snap.exists() ? Object.keys(snap.val()).length : 0;
  });

  onValue(ref(db, 'antwoorden'), snap => {
    if (!sessieActief) return;
    const quiz   = alleQuizzes[actieveQuizId];
    if (!quiz) return;
    const vragen = quiz.vragen ? Object.values(quiz.vragen) : [];
    const vraag  = vragen[sessieVraagIdx];
    if (!vraag) return;
    toonSessieStats(snap.exists() ? snap.val() : {}, vraag);
  });

  onValue(ref(db, 'scores'), snap => {
    if (!sessieActief) return;
    toonScoresMini(snap.exists() ? snap.val() : {});
  });
}

// ── Quiz lijst ──
function renderQuizLijst() {
  const leerjaar  = document.getElementById('filter-leerjaar').value;
  const niveau    = document.getElementById('filter-niveau').value;
  const onderwerp = document.getElementById('filter-onderwerp').value.toLowerCase();
  const el        = document.getElementById('quiz-lijst');

  const gefilterd = Object.entries(alleQuizzes).filter(([, q]) => {
    if (leerjaar  && q.leerjaar  !== leerjaar)  return false;
    if (niveau    && q.niveau    !== niveau)    return false;
    if (onderwerp && !q.onderwerp?.toLowerCase().includes(onderwerp)) return false;
    return true;
  });

  if (!gefilterd.length) { el.innerHTML = '<div class="geen-quizzes">Geen quizzes gevonden.</div>'; return; }
  el.innerHTML = '';
  gefilterd.forEach(([id, q]) => {
    const n   = q.vragen ? Object.keys(q.vragen).length : 0;
    const div = document.createElement('div');
    div.className = 'quiz-item' + (id === actieveQuizId ? ' actief' : '');
    div.innerHTML = `<div class="quiz-naam">${q.naam}</div>
      <div class="quiz-meta">
        <span class="tag">Jaar ${q.leerjaar}</span>
        <span class="tag g">${q.niveau}</span>
        <span class="tag p">${q.onderwerp}</span>
        <span style="color:#475569">${n} vragen</span>
      </div>`;
    div.onclick = () => { actieveQuizId = id; renderQuizLijst(); toonQuizDetail(id); };
    el.appendChild(div);
  });
}
window.filterQuizzes = renderQuizLijst;

// ── Quiz detail ──
function toonQuizDetail(quizId) {
  const q      = alleQuizzes[quizId];
  if (!q) return;
  const vragen = q.vragen ? Object.entries(q.vragen) : [];

  document.getElementById('main').innerHTML = `
    <div class="quiz-detail">
      <div class="quiz-detail-header">
        <h2>${q.naam}</h2>
        <div class="quiz-detail-meta">
          <span class="tag">Jaar ${q.leerjaar}</span>
          <span class="tag g">${q.niveau}</span>
          <span class="tag p">${q.onderwerp}</span>
        </div>
        <div class="quiz-acties">
          <button class="btn btn-groen" onclick="startQuiz('${quizId}')">▶ Start quiz</button>
          <button class="btn btn-grijs" onclick="openBewerkenModal('${quizId}')">✏ Bewerken</button>
          <button class="btn btn-rood"  onclick="verwijderQuiz('${quizId}')">🗑 Verwijderen</button>
        </div>
      </div>
      <div class="quiz-content">
        <div style="font-size:.78em;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:10px;display:flex;align-items:center;gap:8px;">
          <span>VRAGEN</span><span style="color:#475569">${vragen.length}</span>
        </div>
        <div id="vraag-lijst-detail">
          ${vragen.length === 0 ? '<p style="color:#475569;font-size:.88em;">Nog geen vragen. Voeg er een toe hieronder.</p>' : ''}
          ${vragen.map(([vid, v], i) => renderVraagRij(quizId, vid, v, i)).join('')}
        </div>
        ${renderNieuwVraagForm(quizId)}
      </div>
    </div>`;

  // Init form state
  nvState = { type: 'mc', opties: ['','',''], correct: [], paren: [{l:'',r:''},{l:'',r:''}], items: ['','',''] };
  renderNvVeld();
}

function badgeHTML(type) {
  const map = { mc: ['MC', 'badge-mc'], 'mc-multi': ['MC multi', 'badge-mcm'], open: ['Open', 'badge-open'], matching: ['Koppelen', 'badge-match'], sorteren: ['Sorteren', 'badge-sort'] };
  const [lbl, cls] = map[type] || [type, 'badge-mc'];
  return `<span class="type-badge ${cls}">${lbl}</span>`;
}

function renderVraagRij(quizId, vraagId, v, i) {
  let extra = '';
  if ((v.type === 'mc' || v.type === 'mc-multi') && v.opties) {
    const juistArr = Array.isArray(v.juist) ? v.juist : [v.juist];
    extra = '<div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;">' +
      v.opties.map((o, idx) => {
        const l = LETTERS[idx];
        const isJuist = juistArr.includes(l);
        return `<span class="optie-chip${isJuist?' juist':''}">${l}: ${o}</span>`;
      }).join('') + '</div>';
  } else if (v.type === 'open' && v.sleutelwoorden) {
    extra = '<div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;">' +
      v.sleutelwoorden.split(';').map(k => `<span class="sleutel-chip">🔑 ${k.trim()}</span>`).join('') + '</div>';
  } else if (v.type === 'matching' && v.paren) {
    extra = '<div style="margin-top:5px;font-size:.78em;color:#64748b;">' +
      v.paren.map(p => `${p.l} → ${p.r}`).join(' &nbsp;|&nbsp; ') + '</div>';
  } else if (v.type === 'sorteren' && v.items) {
    extra = '<div style="margin-top:5px;font-size:.78em;color:#64748b;">' +
      v.items.map((it, idx) => `${idx+1}. ${it}`).join(' &nbsp;·&nbsp; ') + '</div>';
  }
  return `<div class="vraag-rij" draggable="true"
      data-vraag-id="${vraagId}" data-quiz-id="${quizId}"
      ondblclick="vraagBewerkStart('${quizId}','${vraagId}')"
      ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)">
    <div class="drag-handle" title="Slepen om te herordenen">⠿</div>
    <div class="vraag-rij-nr">${i+1}</div>
    <div class="vraag-rij-body">
      <div style="display:flex;align-items:center;gap:7px;">${badgeHTML(v.type)}</div>
      <div class="vraag-rij-tekst">${v.tekst}</div>
      ${extra}
    </div>
    <div style="display:flex;gap:4px;flex-shrink:0;">
      <button class="btn btn-grijs" style="padding:4px 8px;font-size:.78em;" onclick="event.stopPropagation();vraagBewerkStart('${quizId}','${vraagId}')">✏</button>
      <button class="btn btn-rood"  style="padding:4px 8px;font-size:.78em;" onclick="event.stopPropagation();vraagVerwijderen('${quizId}','${vraagId}')">✕</button>
    </div>
  </div>`;
}

function renderNieuwVraagForm(quizId) {
  return `<div class="nieuwe-vraag-form" id="nv-form">
    <div class="form-sectie-titel">+ Nieuwe vraag</div>
    <div class="form-rij">
      <div>
        <label class="form-label">Type</label>
        <select class="form-inp" id="nv-type" onchange="nvTypeChange()">
          <option value="mc">Meerkeuze (1 antwoord)</option>
          <option value="mc-multi">Meerkeuze (meerdere antwoorden)</option>
          <option value="matching">Koppelen</option>
          <option value="sorteren">Sorteren</option>
          <option value="open">Open vraag</option>
        </select>
      </div>
    </div>
    <div class="form-rij enkel">
      <div>
        <label class="form-label">Vraag</label>
        <textarea class="form-inp" id="nv-tekst" rows="2" placeholder="Typ je vraag…"></textarea>
      </div>
    </div>
    <div id="nv-type-veld"></div>
    <div class="form-acties" id="nv-acties">
      <button class="btn btn-blauw" id="nv-opslaan-btn" onclick="vraagToevoegen('${quizId}')">+ Toevoegen</button>
    </div>
  </div>`;
}

// ── Formulier type-veld render ──
window.nvTypeChange = function() {
  nvState.type = document.getElementById('nv-type').value;
  nvState.correct = [];
  renderNvVeld();
};

function renderNvVeld() {
  const el = document.getElementById('nv-type-veld');
  if (!el) return;
  const type = nvState.type;

  if (type === 'mc' || type === 'mc-multi') {
    const isMulti = type === 'mc-multi';
    let html = `<label class="form-label">Opties <span style="color:#475569">(${isMulti ? 'vink alle juiste antwoorden aan' : 'vink het juiste antwoord aan'})</span></label>`;
    nvState.opties.forEach((opt, i) => {
      const l = LETTERS[i];
      html += `<div class="opt-rij">
        <div class="opt-letter ${l}">${l}</div>
        <input class="form-inp" value="${opt.replace(/"/g,'&quot;')}" oninput="nvState.opties[${i}]=this.value" placeholder="Optie ${l}${l==='D'||l==='E'||l==='F'?' (optioneel)':''}">
        <input type="${isMulti?'checkbox':'radio'}" name="nv-juist" value="${l}" class="juist-check"
               ${nvState.correct.includes(l)?'checked':''}
               onchange="nvToggleCorrect('${l}',this.checked,${isMulti})">
        ${nvState.opties.length > 2 ? `<button class="btn btn-rood" style="padding:3px 7px;font-size:.78em;" onclick="nvVerwijderOptie(${i})">✕</button>` : ''}
      </div>`;
    });
    if (nvState.opties.length < 6)
      html += `<button class="btn btn-grijs add-btn" onclick="nvVoegOptieToE()">+ Optie toevoegen</button>`;
    el.innerHTML = html;

  } else if (type === 'matching') {
    let html = `<label class="form-label">Koppels (links → rechts)</label>`;
    nvState.paren.forEach((p, i) => {
      html += `<div class="match-rij">
        <input class="form-inp" value="${p.l.replace(/"/g,'&quot;')}" oninput="nvState.paren[${i}].l=this.value" placeholder="Term…">
        <span class="match-pijl">→</span>
        <input class="form-inp" value="${p.r.replace(/"/g,'&quot;')}" oninput="nvState.paren[${i}].r=this.value" placeholder="Definitie…">
        ${nvState.paren.length > 2 ? `<button class="btn btn-rood" style="padding:3px 7px;font-size:.78em;" onclick="nvVerwijderPaar(${i})">✕</button>` : ''}
      </div>`;
    });
    if (nvState.paren.length < 8)
      html += `<button class="btn btn-grijs add-btn" onclick="nvVoegPaarToe()">+ Koppel toevoegen</button>`;
    el.innerHTML = html;

  } else if (type === 'sorteren') {
    let html = `<label class="form-label">Items in de juiste volgorde</label>`;
    nvState.items.forEach((item, i) => {
      html += `<div class="item-rij">
        <span class="item-nr">${i+1}</span>
        <input class="form-inp" value="${item.replace(/"/g,'&quot;')}" oninput="nvState.items[${i}]=this.value" placeholder="Item ${i+1}…">
        ${nvState.items.length > 2 ? `<button class="btn btn-rood" style="padding:3px 7px;font-size:.78em;" onclick="nvVerwijderItem(${i})">✕</button>` : ''}
      </div>`;
    });
    if (nvState.items.length < 8)
      html += `<button class="btn btn-grijs add-btn" onclick="nvVoegItemToe()">+ Item toevoegen</button>`;
    el.innerHTML = html;

  } else {
    el.innerHTML = `<label class="form-label">Sleutelwoorden / goede antwoorden <span style="color:#475569">(puntkommagescheiden)</span></label>
      <input class="form-inp" id="nv-sleutelwoorden" placeholder="Bijv: oxidatie; oxideren; geoxideerd">`;
  }
}

// Optie beheer
window.nvToggleCorrect = function(l, checked, isMulti) {
  if (isMulti) { nvState.correct = checked ? [...nvState.correct, l] : nvState.correct.filter(c => c !== l); }
  else         { nvState.correct = checked ? [l] : []; }
};
window.nvVoegOptieToE  = () => { nvState.opties.push(''); renderNvVeld(); };
window.nvVerwijderOptie = i => {
  nvState.opties.splice(i, 1);
  nvState.correct = nvState.correct.filter(c => LETTERS.indexOf(c) < nvState.opties.length);
  renderNvVeld();
};
window.nvVoegPaarToe    = () => { nvState.paren.push({ l: '', r: '' }); renderNvVeld(); };
window.nvVerwijderPaar  = i => { nvState.paren.splice(i, 1); renderNvVeld(); };
window.nvVoegItemToe    = () => { nvState.items.push(''); renderNvVeld(); };
window.nvVerwijderItem  = i => { nvState.items.splice(i, 1); renderNvVeld(); };

// ── Vraag toevoegen ──
let bewerkVraagId = null;

window.vraagBewerkStart = function(quizId, vraagId) {
  const v = alleQuizzes[quizId]?.vragen?.[vraagId];
  if (!v) return;
  bewerkVraagId = vraagId;

  // Vul nvState vanuit bestaande vraag
  nvState.type    = v.type;
  nvState.opties  = v.opties ? [...v.opties] : ['','',''];
  nvState.correct = v.juist  ? (Array.isArray(v.juist) ? [...v.juist] : [v.juist]) : [];
  nvState.paren   = v.paren  ? v.paren.map(p => ({l:p.l, r:p.r})) : [{l:'',r:''},{l:'',r:''}];
  nvState.items   = v.items  ? [...v.items] : ['','',''];

  // Pas type-select aan
  const typeEl = document.getElementById('nv-type');
  if (typeEl) { typeEl.value = v.type; }

  // Vul vraagveld
  const tekstEl = document.getElementById('nv-tekst');
  if (tekstEl) tekstEl.value = v.tekst || '';

  renderNvVeld();

  // Sleutelwoorden voor open vraag
  if (v.type === 'open') {
    const kwEl = document.getElementById('nv-sleutelwoorden');
    if (kwEl) kwEl.value = v.sleutelwoorden || '';
  }

  // Knop naar "Opslaan" + annuleerknop
  const actiesEl = document.getElementById('nv-acties');
  if (actiesEl) {
    actiesEl.innerHTML = `
      <button class="btn btn-grijs" onclick="vraagBewerkAnnuleer('${quizId}')">Annuleren</button>
      <button class="btn btn-blauw" onclick="vraagToevoegen('${quizId}')">💾 Opslaan</button>`;
  }

  // Scroll naar formulier
  document.getElementById('nv-form')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

window.vraagBewerkAnnuleer = function(quizId) {
  bewerkVraagId = null;
  nvState = { type: 'mc', opties: ['','',''], correct: [], paren: [{l:'',r:''},{l:'',r:''}], items: ['','',''] };
  document.getElementById('nv-type').value = 'mc';
  document.getElementById('nv-tekst').value = '';
  renderNvVeld();
  document.getElementById('nv-acties').innerHTML =
    `<button class="btn btn-blauw" id="nv-opslaan-btn" onclick="vraagToevoegen('${quizId}')">+ Toevoegen</button>`;
};

window.vraagToevoegen = async function(quizId) {
  const type  = nvState.type;
  const tekst = document.getElementById('nv-tekst').value.trim();
  if (!tekst) { alert('Voer een vraagtekst in.'); return; }

  const quiz  = alleQuizzes[quizId];
  const tags  = { leerjaar: quiz.leerjaar, niveau: quiz.niveau, onderwerp: quiz.onderwerp };
  const vraag = { type, tekst, tags, quizId, quizNaam: quiz.naam };

  if (type === 'mc' || type === 'mc-multi') {
    const opties = nvState.opties.filter(o => o.trim());
    if (opties.length < 2) { alert('Voer minimaal 2 opties in.'); return; }
    vraag.opties = opties;
    if (type === 'mc') {
      vraag.juist = nvState.correct[0] || null;
    } else {
      const geldig = nvState.correct.filter(c => LETTERS.indexOf(c) < opties.length);
      if (!geldig.length) { alert('Selecteer minimaal één goed antwoord.'); return; }
      vraag.juist = geldig;
    }
  } else if (type === 'matching') {
    const paren = nvState.paren.filter(p => p.l.trim() && p.r.trim());
    if (paren.length < 2) { alert('Voer minimaal 2 koppels in.'); return; }
    vraag.paren = paren;
  } else if (type === 'sorteren') {
    const items = nvState.items.filter(i => i.trim());
    if (items.length < 2) { alert('Voer minimaal 2 items in.'); return; }
    vraag.items = items;
  } else {
    vraag.sleutelwoorden = document.getElementById('nv-sleutelwoorden')?.value.trim() || '';
  }

  if (bewerkVraagId) {
    // Bewerk bestaande vraag
    await set(ref(db, `quizzes/${quizId}/vragen/${bewerkVraagId}`), vraag);
    await set(ref(db, `vragenbank/${bewerkVraagId}`), vraag);
    bewerkVraagId = null;
  } else {
    // Nieuwe vraag aanmaken
    const nieuwRef = push(ref(db, `quizzes/${quizId}/vragen`));
    await set(nieuwRef, vraag);
    await set(ref(db, `vragenbank/${nieuwRef.key}`), vraag);
  }

  document.getElementById('nv-tekst').value = '';
  nvState = { type, opties: ['','',''], correct: [], paren: [{l:'',r:''},{l:'',r:''}], items: ['','',''] };
  renderNvVeld();
};

window.vraagVerwijderen = async function(quizId, vraagId) {
  if (!confirm('Vraag verwijderen?')) return;
  await remove(ref(db, `quizzes/${quizId}/vragen/${vraagId}`));
  await remove(ref(db, `vragenbank/${vraagId}`));
};

// ── Quiz beheer ──
let bewerkQuizId = null;

window.openNieuweQuizModal = function() {
  bewerkQuizId = null;
  document.getElementById('modal-quiz-titel').textContent = 'Nieuwe quiz';
  document.getElementById('modal-naam').value = '';
  document.getElementById('modal-onderwerp').value = '';
  document.getElementById('modal-quiz').style.display = 'flex';
};

window.openBewerkenModal = function(quizId) {
  const q = alleQuizzes[quizId];
  bewerkQuizId = quizId;
  document.getElementById('modal-quiz-titel').textContent = 'Quiz bewerken';
  document.getElementById('modal-naam').value      = q.naam;
  document.getElementById('modal-leerjaar').value  = q.leerjaar;
  document.getElementById('modal-niveau').value    = q.niveau;
  document.getElementById('modal-onderwerp').value = q.onderwerp;
  document.getElementById('modal-quiz').style.display = 'flex';
};

window.slaQuizOp = async function() {
  const naam      = document.getElementById('modal-naam').value.trim();
  const leerjaar  = document.getElementById('modal-leerjaar').value;
  const niveau    = document.getElementById('modal-niveau').value;
  const onderwerp = document.getElementById('modal-onderwerp').value.trim();
  if (!naam || !onderwerp) { alert('Vul naam en onderwerp in.'); return; }
  if (bewerkQuizId) {
    await update(ref(db, `quizzes/${bewerkQuizId}`), { naam, leerjaar, niveau, onderwerp });
  } else {
    const newRef = push(ref(db, 'quizzes'));
    await set(newRef, { naam, leerjaar, niveau, onderwerp });
    actieveQuizId = newRef.key;
  }
  sluitModal('modal-quiz');
};

window.verwijderQuiz = async function(quizId) {
  if (!confirm('Quiz en alle vragen verwijderen?')) return;
  const q = alleQuizzes[quizId];
  if (q?.vragen) for (const vid of Object.keys(q.vragen)) await remove(ref(db, `vragenbank/${vid}`));
  await remove(ref(db, `quizzes/${quizId}`));
  actieveQuizId = null;
  document.getElementById('main').innerHTML = `<div class="leeg-scherm"><div class="icon">📚</div><p>Selecteer een quiz of maak een nieuwe aan</p></div>`;
};

window.sluitModal = id => { document.getElementById(id).style.display = 'none'; };

// ── Sessie starten ──
window.startQuiz = async function(quizId) {
  const quiz   = alleQuizzes[quizId];
  const vragen = quiz.vragen ? Object.values(quiz.vragen) : [];
  if (!vragen.length) { alert('Geen vragen in deze quiz.'); return; }

  actieveQuizId   = quizId;
  sessieActief    = true;
  sessieVraagIdx  = 0;
  huidigeFase     = 'vraag';
  huidigeSessieId = 'sessie_' + Date.now();

  await remove(ref(db, 'antwoorden'));
  await remove(ref(db, 'scores'));
  await set(ref(db, `resultaten/${huidigeSessieId}/meta`), {
    quizNaam: quiz.naam, leerjaar: quiz.leerjaar,
    niveau: quiz.niveau, onderwerp: quiz.onderwerp,
    datum: new Date().toLocaleDateString('nl-NL')
  });
  await set(ref(db, 'sessie'), {
    actief: true, quizId, quizNaam: quiz.naam,
    vraagIdx: 0, vraag: vragen[0], fase: 'vraag'
  });
  toonSessieScherm(quizId, 0);
};

// ── Sessie scherm ──
function vraagDisplayHTML(v, toonJuist) {
  if (v.type === 'mc' || v.type === 'mc-multi') {
    const juistArr = Array.isArray(v.juist) ? v.juist : [v.juist];
    return '<div class="mc-grid">' +
      (v.opties || []).map((o, i) => {
        const l = LETTERS[i];
        const isJuist = toonJuist && juistArr.includes(l);
        return `<div class="mc-blok ${l}${isJuist?' juist':''}"><span class="ltr">${l}</span>${o}</div>`;
      }).join('') + '</div>';
  } else if (v.type === 'matching') {
    return '<div class="match-display">' +
      (v.paren || []).map(p => `<div class="match-pair"><span class="term">${p.l}</span><span style="color:#475569">→</span><span class="def">${p.r}</span></div>`).join('') +
      '</div>';
  } else if (v.type === 'sorteren') {
    return '<div class="sort-display">' +
      (v.items || []).map((it, i) => `<div class="sort-item-display"><span class="sort-nr">${i+1}</span>${it}</div>`).join('') +
      '</div>';
  } else if (v.type === 'open' && v.sleutelwoorden && toonJuist) {
    const kws = v.sleutelwoorden.split(';').map(k => k.trim()).filter(k => k);
    return '<div style="display:flex;gap:6px;flex-wrap:wrap;">' + kws.map(k => `<span class="sleutel-chip">🔑 ${k}</span>`).join('') + '</div>';
  }
  return '';
}

const TYPE_LABELS = { mc: 'Meerkeuze', 'mc-multi': 'Meerkeuze (meerdere)', matching: 'Koppelen', sorteren: 'Sorteren', open: 'Open vraag' };

function toonSessieScherm(quizId, idx) {
  const quiz   = alleQuizzes[quizId];
  const vragen = quiz.vragen ? Object.values(quiz.vragen) : [];
  const v      = vragen[idx];
  const totaal = vragen.length;
  const isLaatste = idx + 1 >= totaal;

  document.getElementById('main').innerHTML = `
    <div class="sessie-scherm">
      <div class="sessie-header">
        <h2>🎓 ${quiz.naam}</h2>
        <span class="voortgang">Vraag ${idx+1} / ${totaal}</span>
        <div class="sessie-knoppen">
          <button class="btn btn-paars" id="btn-toon" onclick="toonResultaten('${quizId}',${idx})">📊 Toon resultaten</button>
          ${isLaatste
            ? `<button class="btn btn-oranje" id="btn-next" onclick="eindeQuiz('${quizId}')" disabled>✓ Afronden</button>`
            : `<button class="btn btn-blauw"  id="btn-next" onclick="volgendeVraag('${quizId}',${idx+1})" disabled>Volgende →</button>`}
          <button class="btn btn-rood" onclick="stopSessie('${quizId}')">⏹ Stop</button>
        </div>
      </div>
      <div class="sessie-body">
        <div class="sessie-links">
          <div class="actieve-vraag-kaart">
            <div class="type-lbl">${TYPE_LABELS[v.type] || v.type} · Vraag ${idx+1}/${totaal}</div>
            <h3>${v.tekst}</h3>
            ${vraagDisplayHTML(v, false)}
          </div>
          <div class="stats-kaart">
            <h4>Antwoorden</h4>
            <div id="sessie-stats"><em style="color:#475569;font-size:.85em">Wachten…</em></div>
          </div>
        </div>
        <div class="sessie-rechts">
          <div class="deelnemers-info">
            <div class="deeln-getal" id="sessie-deeln">0</div>
            <div class="deeln-lbl">leerlingen online</div>
          </div>
          <div class="score-bord-mini">
            <h4>Klassement</h4>
            <div id="scores-mini"><em style="color:#475569;font-size:.82em">Nog geen scores</em></div>
          </div>
        </div>
      </div>
    </div>`;

  onValue(ref(db, 'deelnemers'), snap => {
    const el = document.getElementById('sessie-deeln');
    if (el) el.textContent = snap.exists() ? Object.keys(snap.val()).length : 0;
  });
}

// ── Resultaten tonen + nakijken ──
window.toonResultaten = async function(quizId, idx) {
  const quiz   = alleQuizzes[quizId];
  const vragen = quiz.vragen ? Object.values(quiz.vragen) : [];
  const vraag  = vragen[idx];

  const snap = await get(ref(db, 'antwoorden'));
  const antwoorden = snap.exists() ? snap.val() : {};

  for (const [leerlingId, a] of Object.entries(antwoorden)) {
    let correct = false;
    const type = vraag.type;
    if (type === 'mc') {
      correct = a.antwoord === vraag.juist;
    } else if (type === 'mc-multi') {
      try {
        const student = JSON.parse(a.antwoord || '[]').sort();
        const juist   = (Array.isArray(vraag.juist) ? vraag.juist : [vraag.juist]).sort();
        correct = JSON.stringify(student) === JSON.stringify(juist);
      } catch { correct = false; }
    } else if (type === 'matching') {
      try {
        const studentMap = JSON.parse(a.antwoord || '{}');
        const juistMap   = {};
        (vraag.paren || []).forEach(p => { juistMap[p.l] = p.r; });
        correct = Object.entries(juistMap).every(([k, v]) => studentMap[k] === v);
      } catch { correct = false; }
    } else if (type === 'sorteren') {
      try {
        correct = JSON.stringify(JSON.parse(a.antwoord || '[]')) === JSON.stringify(vraag.items || []);
      } catch { correct = false; }
    } else {
      const kws  = (vraag.sleutelwoorden || '').split(';').map(k => k.trim().toLowerCase()).filter(k => k);
      const antw = (a.antwoord || '').toLowerCase();
      correct = kws.length > 0 && kws.some(k => antw.includes(k));
    }

    await update(ref(db, `antwoorden/${leerlingId}`), { correct });
    const scoreSnap = await get(ref(db, `scores/${leerlingId}`));
    const oud = scoreSnap.exists() ? (scoreSnap.val().punten || 0) : 0;
    await set(ref(db, `scores/${leerlingId}`), { naam: a.naam, punten: correct ? oud + 1 : oud });
  }

  if (huidigeSessieId) {
    await set(ref(db, `resultaten/${huidigeSessieId}/vragen/${idx}`), { tekst: vraag.tekst, type: vraag.type });
    for (const [leerlingId, a] of Object.entries(antwoorden)) {
      await set(ref(db, `resultaten/${huidigeSessieId}/antwoorden/${leerlingId}/vraag_${idx}`), {
        naam: a.naam, antwoord: a.antwoord, correct: antwoorden[leerlingId]?.correct ?? false
      });
    }
  }

  await update(ref(db, 'sessie'), { fase: 'resultaten' });
  huidigeFase = 'resultaten';
  document.getElementById('btn-next')?.removeAttribute('disabled');
  document.getElementById('btn-toon')?.setAttribute('disabled', true);
};

// ── Volgende vraag ──
window.volgendeVraag = async function(quizId, idx) {
  const quiz   = alleQuizzes[quizId];
  const vragen = quiz.vragen ? Object.values(quiz.vragen) : [];
  sessieVraagIdx = idx;
  huidigeFase    = 'vraag';
  await remove(ref(db, 'antwoorden'));
  await update(ref(db, 'sessie'), { vraagIdx: idx, vraag: vragen[idx], fase: 'vraag' });
  toonSessieScherm(quizId, idx);
};

window.eindeQuiz = async function(quizId) {
  await update(ref(db, 'sessie'), { actief: false, fase: 'einde' });
  sessieActief = false;
  const sid = huidigeSessieId;
  toonQuizDetail(quizId);
  const content = document.querySelector('.quiz-content');
  if (content && sid) {
    const div = document.createElement('div');
    div.style.cssText = 'margin-top:16px;padding:16px;background:#14532d;border-radius:10px;display:flex;align-items:center;gap:14px;';

      <div style="flex:1"><div style="font-weight:700;margin-bottom:2px;">Quiz afgerond!</div><div style="font-size:.85em;color:#86efac;">Alle antwoorden zijn opgeslagen.</div></div>
      <button class="btn btn-groen" onclick="exporteerQuizResultaten('${sid}')">📥 Exporteer resultaten</button>`;

window.stopSessie = async function(quizId) {
  if (!confirm('Sessie stoppen?')) return;
  await update(ref(db, 'sessie'), { actief: false, fase: 'wachten' });
  sessieActief = false;
  toonQuizDetail(quizId);
};

// ── Live stats ──
function toonSessieStats(data, vraag) {
  const el = document.getElementById('sessie-stats');
  if (!el) return;
  const antwoorden = Object.values(data);
  if (!antwoorden.length) { el.innerHTML = '<em style="color:#475569;font-size:.85em">Wachten…</em>'; return; }
  const nagekeken = antwoorden.some(a => a.correct !== undefined);

  if (vraag.type === 'mc' || vraag.type === 'mc-multi') {
    const tl = {};
    (vraag.opties || []).forEach((_, i) => tl[LETTERS[i]] = 0);
    antwoorden.forEach(a => {
      const val = a.antwoord;
      // mc-multi: antwoord is JSON array
      try {
        const arr = JSON.parse(val);
        if (Array.isArray(arr)) arr.forEach(l => { if (tl[l] !== undefined) tl[l]++; });
        else if (tl[val] !== undefined) tl[val]++;
      } catch { if (tl[val] !== undefined) tl[val]++; }
    });
    let html = '<div class="balk-wrap">';
    (vraag.opties || []).forEach((opt, i) => {
      const l = LETTERS[i], n = tl[l] || 0;
      const pct = Math.round(n / antwoorden.length * 100);
      html += `<div class="balk-rij">
        <div class="balk-lbl">${l}: ${opt}</div>
        <div class="balk-out"><div class="balk-in" style="width:${pct}%;background:${KLEUR_MAP[l]};color:${KLEUR_TEKST_MAP[l]}">${pct>10?pct+'%':''}</div></div>
        <div class="balk-cnt">${n}</div>
      </div>`;
    });
    html += '</div>';
    if (nagekeken) {
      const goedN = antwoorden.filter(a => a.correct).length;
      const pct   = Math.round(goedN / antwoorden.length * 100);
      html += `<div class="score-info">✅ <strong style="color:#22c55e">${pct}%</strong> goed · ❌ <strong style="color:#ef4444">${100-pct}%</strong> fout</div>`;
    }
    html += `<div style="margin-top:8px;font-size:.8em;color:#475569">Totaal: ${antwoorden.length}</div>`;
    el.innerHTML = html;
  } else {
    // matching, sorteren, open: toon lijst met goed/fout
    let html = '<div class="open-antw-lijst">';
    antwoorden.forEach(a => {
      const cls   = nagekeken ? (a.correct ? 'goed' : 'fout') : '';
      const icoon = nagekeken ? (a.correct ? '✅' : '❌') : '💬';
      let antwtekst = a.antwoord;
      try { const p = JSON.parse(a.antwoord); antwtekst = Array.isArray(p) ? p.join(' → ') : JSON.stringify(p); } catch {}
      html += `<div class="open-antw-item ${cls}"><span style="flex-shrink:0">${icoon}</span>
        <div><div class="open-antw-naam">${a.naam||'Anoniem'}</div>${antwtekst}</div>
      </div>`;
    });
    html += `</div>`;
    if (nagekeken) {
      const goedN = antwoorden.filter(a => a.correct).length;
      const pct   = Math.round(goedN / antwoorden.length * 100);
      html += `<div class="score-info">✅ <strong style="color:#22c55e">${pct}%</strong> goed · ❌ <strong style="color:#ef4444">${100-pct}%</strong> fout</div>`;
    }
    html += `<div style="margin-top:8px;font-size:.8em;color:#475569">Totaal: ${antwoorden.length}</div>`;
    el.innerHTML = html;
  }
}

function toonScoresMini(scores) {
  const el = document.getElementById('scores-mini');
  if (!el) return;
  const gesorteerd = Object.values(scores).sort((a, b) => b.punten - a.punten).slice(0, 8);
  if (!gesorteerd.length) { el.innerHTML = '<em style="color:#475569;font-size:.82em">Nog geen scores</em>'; return; }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = gesorteerd.map((s, i) => `
    <div class="score-rij">
      <div class="score-pos">${medals[i]||i+1}</div>
      <div class="score-naam">${s.naam}</div>
      <div class="score-punten">${s.punten}</div>
    </div>`).join('');
}

// ── Export ──
window.exporteerQuizResultaten = async function(sessieId) {
  const snap = await get(ref(db, `resultaten/${sessieId}`));
  if (!snap.exists()) { alert('Geen resultaten gevonden.'); return; }
  const data = snap.val();
  const meta = data.meta || {};
  const vragen = data.vragen || {};
  const antwoorden = data.antwoorden || {};
  const vraagIdxs = Object.keys(vragen).map(Number).sort((a,b)=>a-b);
  const koppen = vraagIdxs.map(i => `"${vragen[i].tekst}","Goed/Fout"`).join(',');
  let csv = `"Quiz","${meta.quizNaam||''}"\n"Leerjaar ${meta.leerjaar} · ${meta.niveau} · ${meta.onderwerp} · ${meta.datum}"\n\n"Naam",${koppen},"Totaal"\n`;
  const leerlingen = {};
  for (const [lid, vr] of Object.entries(antwoorden)) {
    const naam = Object.values(vr)[0]?.naam || lid;
    leerlingen[lid] = { naam, vragen: vr };
  }
  for (const [, l] of Object.entries(leerlingen)) {
    let rij = `"${l.naam}"`, totaal = 0;
    for (const i of vraagIdxs) {
      const a = l.vragen[`vraag_${i}`];
      rij += `,"${a ? a.antwoord : ''}","${a ? (a.correct ? 'Goed' : 'Fout') : ''}"`;
      if (a?.correct) totaal++;
    }
    csv += rij + `,"${totaal}/${vraagIdxs.length}"\n`;
  }
  const link = document.createElement('a');
  link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  link.download = `${meta.quizNaam||'resultaten'}_${meta.datum||''}.csv`;
  link.click();
};

// ── Import / Voorbeeld ──
// Kolommen: type, vraag, optieA, optieB, optieC, optieD, optieE, optieF, juist, sleutelwoorden
// mc       : opties in A-F kolommen, juist = één letter
// mc-multi : opties in A-F kolommen, juist = kommagescheiden letters  bijv. "A,C"
// matching : optieA = koppelparen  bijv. "H2O:water|NaCl:zout"
// sorteren : optieA = items in volgorde bijv. "stap1|stap2|stap3"
// open     : sleutelwoorden in laatste kolom

window.downloadVoorbeeldCSV = function() {
  const inhoud = [
    'naam,leerjaar,niveau,onderwerp',
    '"Zuren en Basen – herhaling",4,HAVO,Zuren en Basen',
    'type,vraag,optieA,optieB,optieC,optieD,optieE,optieF,juist,sleutelwoorden',
    'mc,"Wat is het pH van puur water?",5,6,7,8,,,C,',
    'mc,"Welke stof is een sterk zuur?",Azijnzuur,Zoutzuur,Citroenzuur,Koolzuur,,,B,',
    'mc-multi,"Welke van deze stoffen zijn zuren?",Azijnzuur,Loog,Citroenzuur,Water,Zoutzuur,,"A,C,E",',
    'matching,"Koppel de formule aan de stofnaam.","H2O:water|NaCl:keukenzout|HCl:zoutzuur",,,,,,',
    'sorteren,"Zet de stappen van een titratie in de juiste volgorde.","Vul de buret|Voeg indicator toe|Titreer tot omslagpunt|Lees het volume af",,,,,,',
    'open,"Wat verstaan we onder neutralisatie?",,,,,,,,"zuur en base, water en zout"',
  ].join('\n');
  const link = document.createElement('a');
  link.href = URL.createObjectURL(new Blob([inhoud], { type: 'text/csv;charset=utf-8;' }));
  link.download = 'voorbeeld_quiz.csv';
  link.click();
};

window.importeerCSV = async function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const tekst   = await file.text();
  const regels  = tekst.split('\n').map(r => r.trim()).filter(r => r);
  if (regels.length < 3) { alert('CSV heeft te weinig regels.'); return; }

  function parseCsv(regel) {
    const result = []; let huidig = '', inQ = false;
    for (const c of regel) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { result.push(huidig.trim()); huidig = ''; }
      else { huidig += c; }
    }
    result.push(huidig.trim());
    return result;
  }

  const quizInfo  = parseCsv(regels[1]);
  const quizNaam  = quizInfo[0] || 'Geïmporteerde quiz';
  const leerjaar  = quizInfo[1] || '4';
  const niveau    = quizInfo[2] || 'HAVO';
  const onderwerp = quizInfo[3] || '';

  const newRef = push(ref(db, 'quizzes'));
  const quizId = newRef.key;
  const vragen = {};

  for (const regel of regels.slice(3)) {
    const [type, vraagtekst, a, b, c, d, e, f, juist, sleutelwoorden] = parseCsv(regel);
    if (!type || !vraagtekst) continue;
    const tags  = { leerjaar, niveau, onderwerp };
    const vraag = { type, tekst: vraagtekst, tags, quizId, quizNaam };

    if (type === 'mc') {
      vraag.opties = [a, b, c, d, e, f].filter(o => o);
      vraag.juist  = juist || null;
    } else if (type === 'mc-multi') {
      vraag.opties = [a, b, c, d, e, f].filter(o => o);
      vraag.juist  = juist ? juist.split(',').map(s => s.trim()) : [];
    } else if (type === 'matching') {
      // a = "term1:def1|term2:def2|..."
      vraag.paren = (a || '').split('|').map(p => {
        const [l, r] = p.split(':');
        return { l: (l||'').trim(), r: (r||'').trim() };
      }).filter(p => p.l && p.r);
    } else if (type === 'sorteren') {
      // a = "item1|item2|item3"
      vraag.items = (a || '').split('|').map(s => s.trim()).filter(s => s);
    } else {
      vraag.sleutelwoorden = sleutelwoorden || '';
    }

    const vid = push(ref(db, `quizzes/${quizId}/vragen`)).key;
    vragen[vid] = vraag;
    await set(ref(db, `vragenbank/${vid}`), vraag);
  }

  await set(newRef, { naam: quizNaam, leerjaar, niveau, onderwerp, vragen });
  actieveQuizId = quizId;
  event.target.value = '';
  alert(`✅ Quiz "${quizNaam}" geïmporteerd met ${Object.keys(vragen).length} vragen!`);
};

// ── Drag-and-drop volgorde ──
let dragSrcId = null;

window.dragStart = function(e) {
  dragSrcId = e.currentTarget.dataset.vraagId;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
};

window.dragOver = function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.vraag-rij').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
};

window.dragEnd = function(e) {
  document.querySelectorAll('.vraag-rij').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
};

window.dragDrop = async function(e) {
  e.preventDefault();
  const targetId = e.currentTarget.dataset.vraagId;
  const quizId   = e.currentTarget.dataset.quizId;
  if (!dragSrcId || dragSrcId === targetId) return;

  const quiz   = alleQuizzes[quizId];
  const vragen = quiz.vragen ? Object.entries(quiz.vragen) : [];

  // Bepaal huidige volgorde en wissel posities
  const srcIdx = vragen.findIndex(([id]) => id === dragSrcId);
  const tgtIdx = vragen.findIndex(([id]) => id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;

  vragen.splice(tgtIdx, 0, vragen.splice(srcIdx, 1)[0]);

  // Sla nieuwe volgorde op: verwijder alle vragen en schrijf opnieuw in volgorde
  const nieuweVragen = {};
  vragen.forEach(([id, v]) => { nieuweVragen[id] = v; });
  await set(ref(db, `quizzes/${quizId}/vragen`), nieuweVragen);
};
