<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Chemistry</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: sans-serif; background: #0f172a; color: #e2e8f0;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
}
header {
  width: 100%; background: #1e293b; padding: 13px 20px;
  display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #334155;
}
header h1 { font-size: 1.15em; color: #38bdf8; }
.naam-badge { margin-left: auto; font-size: .82em; color: #94a3b8; }
.score-badge { background: #1e3a5f; color: #7dd3fc; padding: 3px 10px; border-radius: 20px; font-size: .82em; font-weight: 700; }

.scherm { width: 100%; max-width: 520px; padding: 24px 18px; }

/* Inlog */
.kaart { background: #1e293b; border-radius: 16px; padding: 32px 28px; margin-top: 32px; }
.kaart h2 { font-size: 1.4em; margin-bottom: 6px; }
.kaart p  { color: #64748b; margin-bottom: 24px; font-size: .95em; }
input.groot {
  width: 100%; padding: 13px 16px; border-radius: 10px;
  border: 2px solid #334155; background: #0f172a; color: #e2e8f0;
  font-size: 1.1em; text-align: center; margin-bottom: 12px; outline: none;
  transition: border-color .15s;
}
input.groot:focus { border-color: #38bdf8; }

/* Wacht */
.wacht-kaart { text-align: center; margin-top: 32px; }
.wacht-icoon { font-size: 3em; margin-bottom: 16px; animation: bounce 1.8s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.wacht-kaart h2 { font-size: 1.2em; margin-bottom: 6px; }
.wacht-kaart p  { color: #64748b; font-size: .9em; }

/* Vraag */
.vraag-kaart { background: #1e293b; border-radius: 14px; padding: 22px 20px; margin-top: 20px; }
.type-label { font-size: .78em; color: #64748b; margin-bottom: 8px; }
.vraag-tekst { font-size: 1.2em; font-weight: 700; line-height: 1.4; margin-bottom: 22px; }

.mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mc-knop {
  border: none; border-radius: 10px; padding: 16px 12px;
  font-size: .95em; font-weight: 700; color: white; cursor: pointer;
  display: flex; align-items: center; gap: 8px; text-align: left;
  transition: transform .1s, opacity .15s;
}
.mc-knop:active { transform: scale(.97); }
.mc-knop.A{background:#ef4444} .mc-knop.B{background:#f97316}
.mc-knop.C{background:#22c55e;color:#0f172a} .mc-knop.D{background:#3b82f6}
.mc-knop.E{background:#a855f7} .mc-knop.F{background:#ec4899}
.mc-knop:disabled { opacity: .45; cursor: not-allowed; transform: none; }
.mc-knop.gekozen { outline: 4px solid white; }
.mc-knop .letter { font-size: 1.1em; }

/* mc-multi checkboxes */
.mc-multi-lijst { display: flex; flex-direction: column; gap: 10px; }
.mc-multi-item { display: flex; align-items: center; gap: 12px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: border-color .15s; }
.mc-multi-item:hover { border-color: #38bdf8; }
.mc-multi-item.gekozen { border-color: #38bdf8; background: #1e3a5f; }
.mc-multi-item input[type=checkbox] { width: 18px; height: 18px; accent-color: #38bdf8; flex-shrink: 0; }
.mc-multi-lbl { font-size: .97em; }

/* matching dropdowns */
.matching-lijst { display: flex; flex-direction: column; gap: 10px; }
.matching-rij { display: flex; align-items: center; gap: 10px; background: #0f172a; border-radius: 10px; padding: 10px 14px; }
.matching-term { flex: 1; font-weight: 600; }
.matching-select { flex: 1; background: #1e293b; color: #e2e8f0; border: 2px solid #334155; border-radius: 8px; padding: 8px 10px; font-size: .93em; outline: none; }
.matching-select:focus { border-color: #38bdf8; }

/* sorteren */
.sorteren-lijst { display: flex; flex-direction: column; gap: 8px; }
.sorteren-item { display: flex; align-items: center; gap: 10px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; padding: 11px 14px; }
.sorteren-tekst { flex: 1; font-size: .97em; }
.sorteren-knoppen { display: flex; flex-direction: column; gap: 4px; }
.sorteren-btn { background: #334155; border: none; color: #e2e8f0; border-radius: 6px; width: 28px; height: 24px; cursor: pointer; font-size: .85em; display: flex; align-items: center; justify-content: center; }
.sorteren-btn:hover { background: #475569; }
.sorteren-btn:disabled { opacity: .3; cursor: not-allowed; }

.open-input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1em; outline: none; transition: border-color .15s; }
.open-input:focus { border-color: #38bdf8; }

/* Feedback */
.feedback-kaart { border-radius: 14px; padding: 28px; margin-top: 20px; text-align: center; }
.feedback-kaart.goed { background: #14532d; }
.feedback-kaart.fout { background: #450a0a; }
.feedback-kaart.wacht { background: #1e293b; }
.feedback-icoon { font-size: 3em; margin-bottom: 12px; }
.feedback-kaart h2 { font-size: 1.3em; margin-bottom: 6px; }
.feedback-kaart p  { font-size: .9em; opacity: .75; }
.feedback-score { margin-top: 16px; background: rgba(0,0,0,.2); border-radius: 10px; padding: 12px 20px; display: inline-block; }
.feedback-score .getal { font-size: 2em; font-weight: 700; color: #38bdf8; }
.feedback-score .label { font-size: .78em; color: #94a3b8; }

/* Einde */
.einde-kaart { background: linear-gradient(135deg, #1e3a5f, #0c2233); border-radius: 14px; padding: 32px 24px; margin-top: 20px; text-align: center; }
.einde-kaart h2 { font-size: 1.4em; color: #38bdf8; margin-bottom: 8px; }
.einde-score { font-size: 3em; font-weight: 700; color: #22c55e; margin: 16px 0 4px; }
.einde-lbl { font-size: .88em; color: #64748b; }

button.grote-knop {
  width: 100%; margin-top: 14px; padding: 13px; border: none; border-radius: 10px;
  background: #38bdf8; color: #0f172a; font-size: 1em; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
button.grote-knop:hover { opacity: .88; }
button.grote-knop:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>🧪 Brain Chemistry</h1>
  <span class="naam-badge" id="naam-badge"></span>
  <span class="score-badge" id="score-badge" style="display:none">0 pt</span>
</header>

<div class="scherm" id="scherm-inlog">
  <div class="kaart">
    <h2>Welkom! 👋</h2>
    <p>Voer je naam in om mee te doen</p>
    <input type="text" class="groot" id="naam-input" placeholder="Jouw naam" maxlength="30"
           onkeydown="if(event.key==='Enter') deelnemen()">
    <button class="grote-knop" onclick="deelnemen()">Deelnemen →</button>
  </div>
</div>

<div class="scherm" id="scherm-wacht" style="display:none">
  <div class="wacht-kaart">
    <div class="wacht-icoon">⏳</div>
    <h2>Wachten op de docent…</h2>
    <p>De volgende vraag verschijnt hier automatisch</p>
  </div>
</div>

<div class="scherm" id="scherm-vraag" style="display:none">
  <div class="vraag-kaart">
    <div class="type-label" id="v-type-label"></div>
    <div class="vraag-tekst" id="v-tekst"></div>
    <div id="v-invoer"></div>
  </div>
</div>

<div class="scherm" id="scherm-feedback" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update }
    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmCeuVZr888XzPkfX5MrQ8xxZ96ttaIsQ",
  authDomain: "brain-chemistry.firebaseapp.com",
  databaseURL: "https://brain-chemistry-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "brain-chemistry",
  storageBucket: "brain-chemistry.firebasestorage.app",
  messagingSenderId: "359983668951",
  appId: "1:359983668951:web:8c3504c9d5734219a31a92"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let mijnNaam = '';
let mijnId   = '';
let huidigVraagIdx = null;
let heeftGeantwoord = false;
let mijnPunten = 0;
let mijnResultaten = [];   // { tekst, correct } per vraag
let huidigeVraag   = null; // sla huidige vraag op voor feedback

function toon(id) {
  ['scherm-inlog','scherm-wacht','scherm-vraag','scherm-feedback']
    .forEach(s => document.getElementById(s).style.display = s === id ? '' : 'none');
}

window.deelnemen = function() {
  const naam = document.getElementById('naam-input').value.trim();
  if (!naam) { document.getElementById('naam-input').focus(); return; }
  mijnNaam = naam;
  mijnId   = 'l_' + Math.random().toString(36).slice(2, 9);

  set(ref(db, 'deelnemers/' + mijnId), { naam });
  document.getElementById('naam-badge').textContent = naam;
  toon('scherm-wacht');
  luisterNaarSessie();
};

function luisterNaarSessie() {
  onValue(ref(db, 'sessie'), snap => {
    if (!snap.exists()) { toon('scherm-wacht'); return; }
    const s = snap.val();

    if (!s.actief) {
      if (s.fase === 'einde') {
        toonEinde();
      } else {
        huidigVraagIdx  = null;
        heeftGeantwoord = false;
        toon('scherm-wacht');
      }
      return;
    }

    const fase = s.fase || 'vraag';
    const v    = s.vraag;

    if (fase === 'resultaten' && heeftGeantwoord) {
      // Luister naar eigen nakijkresultaat
      onValue(ref(db, `antwoorden/${mijnId}`), aSnap => {
        if (!aSnap.exists()) return;
        const a = aSnap.val();
        if (a.correct !== undefined) toonFeedback(a.correct);
      });
      return;
    }

    if (fase === 'vraag') {
      if (v.idx === huidigVraagIdx && heeftGeantwoord) return;
      if (v.idx !== huidigVraagIdx) {
        huidigVraagIdx  = v.idx;
        heeftGeantwoord = false;
      }
      huidigeVraag = v;
      toonVraag(v);
    }
  });

  // Eigen score bijhouden
  onValue(ref(db, `scores/${mijnId}`), snap => {
    if (!snap.exists()) return;
    mijnPunten = snap.val().punten || 0;
    const el = document.getElementById('score-badge');
    el.style.display = '';
    el.textContent = `${mijnPunten} pt`;
  });
}

const KLEUREN = ['A','B','C','D','E','F'];
const TYPE_LABELS = { mc:'Meerkeuze', 'mc-multi':'Meerkeuze (meerdere)', matching:'Koppelen', sorteren:'Sorteren', open:'Open vraag' };

function toonVraag(v) {
  document.getElementById('v-type-label').textContent = TYPE_LABELS[v.type] || v.type;
  document.getElementById('v-tekst').textContent = v.tekst;

  const invoerEl = document.getElementById('v-invoer');

  if (v.type === 'mc') {
    invoerEl.innerHTML = '<div class="mc-grid">' +
      (v.opties || []).map((opt, i) => {
        const l = KLEUREN[i];
        return `<button class="mc-knop ${l}" onclick="stuurMC('${l}')">
          <span class="letter">${l}</span>${opt}
        </button>`;
      }).join('') + '</div>';

  } else if (v.type === 'mc-multi') {
    invoerEl.innerHTML = `<div class="mc-multi-lijst">` +
      (v.opties || []).map((opt, i) => {
        const l = KLEUREN[i];
        return `<label class="mc-multi-item" onclick="toggleMulti(this)">
          <input type="checkbox" value="${l}" onclick="event.stopPropagation();toggleMulti(this.closest('.mc-multi-item'))">
          <span class="mc-multi-lbl"><strong>${l}</strong> ${opt}</span>
        </label>`;
      }).join('') +
      `</div><button class="grote-knop" style="margin-top:12px" onclick="stuurMulti()">Verstuur antwoord</button>`;

  } else if (v.type === 'matching') {
    const rechts = (v.paren || []).map(p => p.r).sort(() => Math.random() - 0.5);
    invoerEl.innerHTML = `<div class="matching-lijst">` +
      (v.paren || []).map((p, i) => `
        <div class="matching-rij">
          <div class="matching-term">${p.l}</div>
          <select class="matching-select" id="match-${i}">
            <option value="">-- kies --</option>
            ${rechts.map(r => `<option value="${r}">${r}</option>`).join('')}
          </select>
        </div>`).join('') +
      `</div><button class="grote-knop" style="margin-top:12px" onclick="stuurMatching(${JSON.stringify(JSON.stringify((v.paren||[]).map(p=>p.l)))})">Verstuur antwoord</button>`;

  } else if (v.type === 'sorteren') {
    // randomize items for display
    const items = [...(v.items || [])].sort(() => Math.random() - 0.5);
    window._sorteerItems = items;
    renderSorteren(invoerEl);

  } else {
    invoerEl.innerHTML = `
      <textarea class="open-input" id="open-antwoord" rows="4" placeholder="Typ je antwoord hier…"></textarea>
      <button class="grote-knop" onclick="stuurOpen()">Verstuur antwoord</button>`;
  }
  toon('scherm-vraag');
}

function renderSorteren(container) {
  const items = window._sorteerItems;
  container = container || document.getElementById('v-invoer');
  container.innerHTML = `<div class="sorteren-lijst">` +
    items.map((item, i) => `
      <div class="sorteren-item" id="si-${i}">
        <div class="sorteren-knoppen">
          <button class="sorteren-btn" onclick="verschuif(${i},-1)" ${i===0?'disabled':''}>▲</button>
          <button class="sorteren-btn" onclick="verschuif(${i},1)" ${i===items.length-1?'disabled':''}>▼</button>
        </div>
        <div class="sorteren-tekst">${item}</div>
      </div>`).join('') +
    `</div><button class="grote-knop" style="margin-top:12px" onclick="stuurSorteren()">Verstuur antwoord</button>`;
}

window.verschuif = function(i, dir) {
  const items = window._sorteerItems;
  const j = i + dir;
  if (j < 0 || j >= items.length) return;
  [items[i], items[j]] = [items[j], items[i]];
  renderSorteren();
};

window.toggleMulti = function(el) {
  el.classList.toggle('gekozen');
  el.querySelector('input').checked = el.classList.contains('gekozen');
};

window.stuurMC = function(letter) {
  if (heeftGeantwoord) return;
  heeftGeantwoord = true;
  document.querySelectorAll('.mc-knop').forEach(b => b.disabled = true);
  document.querySelector('.mc-knop.' + letter)?.classList.add('gekozen');
  stuurAntwoord(letter);
  toonWachtOpResultaat();
};

window.stuurMulti = function() {
  if (heeftGeantwoord) return;
  const gekozen = [...document.querySelectorAll('.mc-multi-item.gekozen input')].map(el => el.value);
  if (!gekozen.length) { alert('Selecteer minstens één antwoord.'); return; }
  heeftGeantwoord = true;
  stuurAntwoord(JSON.stringify(gekozen));
  toonWachtOpResultaat();
};

window.stuurMatching = function(linksJSON) {
  if (heeftGeantwoord) return;
  const links = JSON.parse(linksJSON);
  const antw = {};
  let volledig = true;
  links.forEach((term, i) => {
    const val = document.getElementById('match-' + i)?.value;
    if (!val) { volledig = false; }
    antw[term] = val || '';
  });
  if (!volledig) { alert('Koppel alle termen aan een definitie.'); return; }
  heeftGeantwoord = true;
  stuurAntwoord(JSON.stringify(antw));
  toonWachtOpResultaat();
};

window.stuurSorteren = function() {
  if (heeftGeantwoord) return;
  heeftGeantwoord = true;
  stuurAntwoord(JSON.stringify(window._sorteerItems));
  toonWachtOpResultaat();
};

window.stuurOpen = function() {
  if (heeftGeantwoord) return;
  const tekst = document.getElementById('open-antwoord')?.value.trim();
  if (!tekst) return;
  heeftGeantwoord = true;
  stuurAntwoord(tekst);
  toonWachtOpResultaat();
};

function stuurAntwoord(antwoord) {
  set(ref(db, 'antwoorden/' + mijnId), {
    naam: mijnNaam, antwoord, tijdstip: Date.now()
  });
}

function toonWachtOpResultaat() {
  document.getElementById('scherm-feedback').innerHTML = `
    <div class="feedback-kaart wacht">
      <div class="feedback-icoon">📨</div>
      <h2>Antwoord verzonden!</h2>
      <p>Wacht op de docent…</p>
    </div>`;
  toon('scherm-feedback');
}

function toonFeedback(correct) {
  // Sla resultaat op voor eindfeedback
  if (huidigeVraag && !mijnResultaten.find(r => r.tekst === huidigeVraag.tekst)) {
    mijnResultaten.push({ tekst: huidigeVraag.tekst, correct });
  }

  const el = document.getElementById('scherm-feedback');
  if (correct) {
    el.innerHTML = `
      <div class="feedback-kaart goed">
        <div class="feedback-icoon">✅</div>
        <h2>Goed gedaan!</h2>
        <p>Dat was het juiste antwoord</p>
        <div class="feedback-score">
          <div class="getal">${mijnPunten}</div>
          <div class="label">punten totaal</div>
        </div>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="feedback-kaart fout">
        <div class="feedback-icoon">❌</div>
        <h2>Helaas, fout!</h2>
        <p>Beter geluk de volgende keer</p>
        <div class="feedback-score">
          <div class="getal">${mijnPunten}</div>
          <div class="label">punten totaal</div>
        </div>
      </div>`;
  }
  toon('scherm-feedback');
}

function toonEinde() {
  const totaal  = mijnResultaten.length;
  const goed    = mijnResultaten.filter(r => r.correct).length;
  const pct     = totaal > 0 ? Math.round(goed / totaal * 100) : 0;

  const motivatie = pct === 100 ? 'Perfect gescoord! Geweldig werk! 🌟'
    : pct >= 80 ? 'Heel goed gedaan! Bijna alles goed! 💪'
    : pct >= 60 ? 'Goed bezig! Nog even oefenen en je hebt het! 📚'
    : pct >= 40 ? 'Aardig geprobeerd, er is nog ruimte voor verbetering. 🔍'
    : 'Dit onderwerp verdient nog wat extra aandacht. Niet opgeven! 💡';

  const vraagLijst = totaal > 0 ? `
    <div style="margin-top:20px;text-align:left;">
      <div style="font-size:.78em;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin-bottom:10px;">Jouw resultaten per vraag</div>
      ${mijnResultaten.map((r, i) => `
        <div style="display:flex;gap:10px;align-items:flex-start;background:${r.correct ? '#14532d' : '#450a0a'};border-radius:8px;padding:10px 12px;margin-bottom:6px;">
          <span style="font-size:1em;flex-shrink:0;">${r.correct ? '✅' : '❌'}</span>
          <div>
            <div style="font-size:.72em;color:${r.correct ? '#86efac' : '#fca5a5'};margin-bottom:1px;">Vraag ${i + 1}</div>
            <div style="font-size:.88em;color:#e2e8f0;">${r.tekst}</div>
          </div>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('scherm-feedback').innerHTML = `
    <div class="einde-kaart">
      <h2>Quiz afgerond! 🎉</h2>
      <div class="einde-score">${goed}/${totaal}</div>
      <div class="einde-lbl">${pct}% goed</div>
      <div style="margin-top:14px;font-size:.95em;color:#7dd3fc;">${motivatie}</div>
      ${vraagLijst}
    </div>`;
  toon('scherm-feedback');
}
</script>
</body>
</html>
