<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Brain Chemistry – Scorebord</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { background: #1e293b; padding: 12px 28px; display: flex; align-items: center; gap: 14px; border-bottom: 2px solid #334155; flex-shrink: 0; }
header h1 { font-size: 1.3em; color: #38bdf8; }
.quiz-naam-hdr { font-size: .9em; color: #64748b; }
.voortgang-hdr { margin-left: auto; font-size: .9em; color: #94a3b8; }

.layout { display: flex; flex: 1; overflow: hidden; gap: 0; }

/* ── Links: vraag + resultaten ── */
.links { flex: 1; display: flex; flex-direction: column; padding: 24px; gap: 18px; overflow-y: auto; border-right: 1px solid #334155; }

.wacht-scherm { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #334155; gap: 16px; }
.wacht-scherm .icon { font-size: 4em; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.wacht-scherm h2 { font-size: 1.4em; color: #475569; }

.vraag-kaart { background: #1e293b; border-radius: 14px; padding: 26px 28px; }
.vraag-kaart .type-lbl { font-size: .8em; color: #64748b; margin-bottom: 8px; }
.vraag-kaart h2 { font-size: 1.4em; line-height: 1.4; margin-bottom: 20px; }

.mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mc-blok { border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; font-size: 1em; font-weight: 600; }
.mc-blok.A{background:#7f1d1d} .mc-blok.B{background:#111111;border:1px solid #475569} .mc-blok.C{background:#78350f} .mc-blok.D{background:#1e3a5f}
.mc-blok.E{background:#581c87} .mc-blok.F{background:#7c2d12}
.mc-blok.juist { outline: 3px solid #22c55e; }
.mc-blok .ltr { font-size: 1.2em; font-weight: 800; }

.resultaten-kaart { background: #1e293b; border-radius: 14px; padding: 22px 28px; }
.resultaten-kaart h3 { font-size: .85em; text-transform: uppercase; letter-spacing: .07em; color: #64748b; margin-bottom: 16px; }

.balk-wrap { display: flex; flex-direction: column; gap: 10px; }
.balk-rij { display: flex; align-items: center; gap: 12px; font-size: .95em; }
.balk-lbl { width: 140px; flex-shrink: 0; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.balk-out { flex: 1; background: #334155; border-radius: 6px; height: 32px; overflow: hidden; }
.balk-in  { height: 100%; border-radius: 6px; transition: width .5s ease; display: flex; align-items: center; padding-left: 10px; font-size: .88em; font-weight: 700; color: #0f172a; min-width: 2px; }
.balk-cnt { width: 40px; text-align: right; color: #64748b; font-weight: 700; }

.score-samenvatting { display: flex; gap: 20px; margin-top: 16px; }
.score-stat { background: #0f172a; border-radius: 8px; padding: 10px 16px; text-align: center; flex: 1; }
.score-stat .getal { font-size: 1.6em; font-weight: 700; }
.score-stat .label { font-size: .75em; color: #64748b; margin-top: 2px; }
.getal.groen { color: #22c55e; }
.getal.rood  { color: #ef4444; }

.open-antw-lijst { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
.open-antw-item { border-radius: 8px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; font-size: .92em; }
.open-antw-item.goed { background: #14532d; }
.open-antw-item.fout { background: #1e293b; border: 1px solid #334155; }
.open-antw-item.onbekend { background: #1e293b; border: 1px solid #334155; }
.open-antw-naam { font-size: .76em; color: #64748b; margin-bottom: 2px; }
.antw-icoon { font-size: 1.1em; flex-shrink: 0; margin-top: 1px; }

/* ── Rechts: klassement ── */
.rechts { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; padding: 24px 20px; gap: 14px; overflow-y: auto; }
.klassement-header { font-size: .82em; text-transform: uppercase; letter-spacing: .07em; color: #64748b; margin-bottom: 4px; }

.score-kaart { background: #1e293b; border-radius: 12px; overflow: hidden; }
.score-rij { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #0f172a; transition: background .3s; }
.score-rij:last-child { border-bottom: none; }
.score-rij.top1 { background: linear-gradient(135deg, #78350f, #92400e); }
.score-rij.top2 { background: linear-gradient(135deg, #1e293b, #334155); }
.score-rij.top3 { background: linear-gradient(135deg, #1c1917, #292524); }
.score-pos { font-size: 1.3em; width: 32px; flex-shrink: 0; text-align: center; }
.score-naam { flex: 1; font-weight: 600; font-size: .95em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.score-punten-badge { background: #0f172a; border-radius: 20px; padding: 3px 12px; font-weight: 700; color: #38bdf8; font-size: .9em; flex-shrink: 0; }

.einde-banner { background: linear-gradient(135deg, #1e3a5f, #0c2233); border-radius: 12px; padding: 20px; text-align: center; }
.einde-banner h2 { font-size: 1.1em; color: #38bdf8; margin-bottom: 4px; }
.einde-banner p { font-size: .85em; color: #64748b; }

#ww-overlay {
  position: fixed; inset: 0; background: #0f172a; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
}
.ww-kaart {
  background: #1e293b; border-radius: 16px; padding: 40px 36px;
  width: 340px; text-align: center; border: 1px solid #334155;
}
.ww-kaart h2 { font-size: 1.3em; margin-bottom: 6px; }
.ww-kaart p  { color: #64748b; font-size: .9em; margin-bottom: 24px; }
.ww-input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 2px solid #334155; background: #0f172a; color: #e2e8f0;
  font-size: 1.05em; text-align: center; outline: none; margin-bottom: 10px;
  transition: border-color .15s;
}
.ww-input:focus { border-color: #38bdf8; }
.ww-fout { color: #ef4444; font-size: .85em; margin-bottom: 8px; min-height: 20px; }
</style>
</head>
<body>

<div id="ww-overlay">
  <div class="ww-kaart">
    <h2>🔐 Docenttoegang</h2>
    <p>Voer het docentwachtwoord in</p>
    <input type="password" class="ww-input" id="ww-input" placeholder="Wachtwoord"
           onkeydown="if(event.key==='Enter') wwControle()">
    <div class="ww-fout" id="ww-fout"></div>
    <button onclick="wwControle()" style="width:100%;padding:12px;border:none;border-radius:10px;background:#38bdf8;color:#0f172a;font-size:1em;font-weight:700;cursor:pointer;">Inloggen</button>
  </div>
</div>

<header>
  <h1>🧪 Brain Chemistry</h1>
  <span class="quiz-naam-hdr" id="hdr-quiz-naam"></span>
  <span class="voortgang-hdr" id="hdr-voortgang"></span>
</header>

<div class="layout">
  <div class="links" id="links">
    <div class="wacht-scherm">
      <div class="icon">⏳</div>
      <h2>Wachten op de docent…</h2>
    </div>
  </div>
  <div class="rechts">
    <div class="klassement-header">🏆 Klassement</div>
    <div class="score-kaart" id="klassement">
      <div style="padding:20px;text-align:center;color:#475569;font-size:.88em;">Nog geen scores</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmCeuVZr888XzPkfX5MrQ8xxZ96ttaIsQ",
  authDomain: "brain-chemistry.firebaseapp.com",
  databaseURL: "https://brain-chemistry-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "brain-chemistry",
  storageBucket: "brain-chemistry.firebasestorage.app",
  messagingSenderId: "359983668951",
  appId: "1:359983668951:web:8c3504c9d5734219a31a92"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const auth = getAuth(app);

// ── Echte docent-login i.p.v. het oude localStorage-wachtwoordveld ──
// Het scorebord leest dezelfde brede data als de docentapp, dus het logt ook
// in als het docentaccount (zelfde wachtwoord als docent.html).
const DOCENT_EMAIL = 'docent@brainchemistry.local'; // moet gelijk zijn aan docent.html

window.wwControle = function() {
  const ww = document.getElementById('ww-input').value;
  signInWithEmailAndPassword(auth, DOCENT_EMAIL, ww)
    .then(() => {
      document.getElementById('ww-overlay').style.display = 'none';
    })
    .catch(() => {
      document.getElementById('ww-fout').textContent = 'Onjuist wachtwoord';
      document.getElementById('ww-input').value = '';
      document.getElementById('ww-input').focus();
    });
};

onAuthStateChanged(auth, user => {
  if (user && user.email === DOCENT_EMAIL) {
    document.getElementById('ww-overlay').style.display = 'none';
  } else {
    document.getElementById('ww-overlay').style.display = 'flex';
  }
});

let huidigeSessie = null;
let huidigeAntwoorden = {};

onValue(ref(db, 'sessie'), snap => {
  huidigeSessie = snap.exists() ? snap.val() : null;
  renderLinks();
});

onValue(ref(db, 'antwoorden'), snap => {
  huidigeAntwoorden = snap.exists() ? snap.val() : {};
  renderLinks();
});

onValue(ref(db, 'scores'), snap => {
  renderKlassement(snap.exists() ? snap.val() : {});
});

function renderLinks() {
  const s = huidigeSessie;
  if (!s || !s.actief) {
    if (s?.fase === 'einde') {
      document.getElementById('links').innerHTML = `
        <div class="wacht-scherm">
          <div class="icon">🎉</div>
          <h2>Quiz afgerond!</h2>
          <p style="color:#64748b">Bekijk het eindklassement →</p>
        </div>`;
      document.getElementById('hdr-quiz-naam').textContent = '';
      document.getElementById('hdr-voortgang').textContent = '';
    } else {
      document.getElementById('links').innerHTML = `
        <div class="wacht-scherm">
          <div class="icon">⏳</div>
          <h2>Wachten op de docent…</h2>
        </div>`;
      document.getElementById('hdr-quiz-naam').textContent = '';
      document.getElementById('hdr-voortgang').textContent = '';
    }
    return;
  }

  const v      = s.vraag;
  const fase   = s.fase || 'vraag';
  const idx    = s.vraagIdx || 0;
  const antw   = Object.values(huidigeAntwoorden);

  document.getElementById('hdr-quiz-naam').textContent = s.quizNaam || '';
  document.getElementById('hdr-voortgang').textContent = `Vraag ${idx + 1}`;

  const LETTERS = ['A','B','C','D','E','F'];
  const KLEUREN_MC = { A:'#ef4444', B:'#000000', C:'#eab308', D:'#3b82f6', E:'#a855f7', F:'#f97316' };
  const KLEUREN_MC_TEKST = { A:'#0f172a', B:'#e2e8f0', C:'#0f172a', D:'#0f172a', E:'#0f172a', F:'#0f172a' };
  const TYPE_LABELS = { mc:'Meerkeuze', 'mc-multi':'Meerkeuze (meerdere)', matching:'Koppelen', sorteren:'Sorteren', open:'Open vraag' };

  // Vraagweergave
  let vraagHTML = '';
  if (v.type === 'mc' || v.type === 'mc-multi') {
    const toonJuist = fase === 'resultaten';
    const juistArr = Array.isArray(v.juist) ? v.juist : [v.juist];
    vraagHTML = '<div class="mc-grid">' +
      (v.opties || []).map((o, i) => {
        const l = LETTERS[i];
        const isJuist = toonJuist && juistArr.includes(l);
        return `<div class="mc-blok ${l}${isJuist?' juist':''}"><span class="ltr">${l}</span>${o}</div>`;
      }).join('') + '</div>';
  } else if (v.type === 'matching' && fase === 'resultaten') {
    vraagHTML = `<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">` +
      (v.paren || []).map(p => `
        <div style="display:flex;gap:10px;align-items:center;background:#14532d;border-radius:8px;padding:8px 14px;">
          <span style="flex:1;font-weight:600;">${p.l}</span>
          <span style="color:#86efac;">→</span>
          <span style="flex:1;">${p.r}</span>
        </div>`).join('') + `</div>`;
  } else if (v.type === 'sorteren' && fase === 'resultaten') {
    vraagHTML = `<div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">` +
      (v.items || []).map((item, i) => `
        <div style="display:flex;gap:10px;align-items:center;background:#1e3a5f;border-radius:8px;padding:8px 14px;">
          <span style="color:#38bdf8;font-weight:700;width:24px;">${i+1}.</span>
          <span>${item}</span>
        </div>`).join('') + `</div>`;
  } else if (fase === 'resultaten' && v.sleutelwoorden) {
    const kws = v.sleutelwoorden.split(';').map(k => k.trim()).filter(k => k);
    vraagHTML = `<div style="margin-top:-8px;display:flex;gap:8px;flex-wrap:wrap;">
      ${kws.map(k => `<span style="background:#14532d;color:#86efac;padding:4px 12px;border-radius:20px;font-size:.88em;">🔑 ${k}</span>`).join('')}
    </div>`;
  }

  // Resultatenweergave
  let resultatenHTML = '';
  if (fase === 'resultaten' && antw.length > 0) {
    const nagekeken = antw.some(a => a.correct !== undefined);
    const goedN = nagekeken ? antw.filter(a => a.correct).length : null;
    const pct   = goedN !== null ? Math.round(goedN / antw.length * 100) : null;
    const samenvattingHTML = pct !== null ? `
      <div class="score-samenvatting" style="margin-top:12px;">
        <div class="score-stat"><div class="getal groen">${pct}%</div><div class="label">goed</div></div>
        <div class="score-stat"><div class="getal rood">${100-pct}%</div><div class="label">fout</div></div>
        <div class="score-stat"><div class="getal" style="color:#94a3b8">${antw.length}</div><div class="label">antwoorden</div></div>
      </div>` : '';

    if (v.type === 'mc') {
      const tl = {};
      (v.opties || []).forEach((_, i) => tl[LETTERS[i]] = 0);
      antw.forEach(a => { if (tl[a.antwoord] !== undefined) tl[a.antwoord]++; });
      resultatenHTML = `<div class="resultaten-kaart">
        <h3>Resultaten (${antw.length} antwoorden)</h3>
        <div class="balk-wrap">
          ${(v.opties || []).map((opt, i) => {
            const l = LETTERS[i], n = tl[l] || 0;
            const p = Math.round(n / antw.length * 100);
            return `<div class="balk-rij">
              <div class="balk-lbl">${l}: ${opt}</div>
              <div class="balk-out"><div class="balk-in" style="width:${p}%;background:${KLEUREN_MC[l]};color:${KLEUREN_MC_TEKST[l]}">${p>8?p+'%':''}</div></div>
              <div class="balk-cnt">${n}</div>
            </div>`;
          }).join('')}
        </div>${samenvattingHTML}</div>`;
    } else {
      // mc-multi, matching, sorteren, open: toon per leerling goed/fout
      resultatenHTML = `<div class="resultaten-kaart">
        <h3>Antwoorden (${antw.length})</h3>
        <div class="open-antw-lijst">
          ${antw.map(a => {
            const nk    = a.correct !== undefined;
            const cls   = nk ? (a.correct ? 'goed' : 'fout') : 'onbekend';
            const icoon = nk ? (a.correct ? '✅' : '❌') : '💬';
            let antwtekst = a.antwoord;
            try {
              const parsed = JSON.parse(a.antwoord);
              if (Array.isArray(parsed)) antwtekst = parsed.join(' → ');
              else if (typeof parsed === 'object') antwtekst = Object.entries(parsed).map(([k,vv])=>`${k} → ${vv}`).join(', ');
            } catch(e) {}
            return `<div class="open-antw-item ${cls}">
              <span class="antw-icoon">${icoon}</span>
              <div><div class="open-antw-naam">${a.naam||'Anoniem'}</div>${antwtekst}</div>
            </div>`;
          }).join('')}
        </div>${samenvattingHTML}</div>`;
    }
  } else if (fase === 'vraag') {
    resultatenHTML = `<div style="text-align:center;color:#475569;padding:20px;font-size:.9em;">
      ${antw.length} antwoord${antw.length !== 1 ? 'en' : ''} binnengekomen…
    </div>`;
  }

  document.getElementById('links').innerHTML = `
    <div class="vraag-kaart">
      <div class="type-lbl">${TYPE_LABELS[v.type] || v.type}</div>
      <h2>${v.tekst}</h2>
      ${vraagHTML}
    </div>
    ${resultatenHTML}`;
}

function renderKlassement(scores) {
  const el = document.getElementById('klassement');
  const gesorteerd = Object.values(scores).sort((a, b) => b.punten - a.punten);
  if (!gesorteerd.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#475569;font-size:.88em;">Nog geen scores</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  const klassen = ['top1','top2','top3'];
  el.innerHTML = gesorteerd.map((s, i) => `
    <div class="score-rij ${klassen[i]||''}">
      <div class="score-pos">${medals[i] || i+1}</div>
      <div class="score-naam">${s.naam}</div>
      <div class="score-punten-badge">${s.punten} pt</div>
    </div>`).join('');
}
</script>
</body>
</html>
